# Blood Bank API - Nginx Configuration
# Production-ready reverse proxy for Node.js backend
# Place in: /etc/nginx/sites-available/bloodbank

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.bloodconnect.com www.api.bloodconnect.com;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bloodconnect.com www.api.bloodconnect.com;

    # ============================================
    # SSL CERTIFICATE CONFIGURATION
    # ============================================
    ssl_certificate /etc/letsencrypt/live/bloodconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bloodconnect.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bloodconnect.com/chain.pem;

    # SSL Configuration - Mozilla Recommended
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://sentry.io; frame-ancestors 'none';" always;

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/bloodbank-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/bloodbank-error.log warn;

    # ============================================
    # GZIP COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_comp_level 6;
    gzip_buffers 16 8k;

    # ============================================
    # RATE LIMITING
    # ============================================
    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ============================================
    # PROXY CONFIGURATION
    # ============================================
    
    # General API proxy
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;

        # Node.js backend
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 /5xx.html;
    }

    # Strict rate limit for authentication endpoints
    location ~ ^/api/(login|register|forgot-password|change-password)$ {
        limit_req zone=strict_limit burst=5 nodelay;
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets (if served from Node)
    location ~* \.(js|css|png|gif|ico|jpg|jpeg|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:4000;
        proxy_cache_valid 200 30d;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Health check endpoint (no rate limit)
    location /api/health {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        access_log off;
    }

    # Metrics endpoint (trusted IPs only - adjust as needed)
    location /api/metrics {
        allow 127.0.0.1;
        allow ::1;
        # Add your monitoring service IPs here
        # allow 203.0.113.0/24;
        deny all;
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
    }

    # Swagger documentation
    location /api/docs {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 502 503 504 /5xx.html;
    location = /5xx.html {
        root /var/www/errors;
        internal;
    }

    # Favicon and robots
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://localhost:4000;
        access_log off;
    }
}

# Frontend - Serve React build
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bloodconnect.com www.bloodconnect.com;

    ssl_certificate /etc/letsencrypt/live/bloodconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bloodconnect.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/bloodbank-frontend/build;
    index index.html;

    # All routes go to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static files
    location ~* \.(js|css|png|gif|ico|jpg|jpeg|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate, no-cache";
    }

    access_log /var/log/nginx/bloodbank-frontend-access.log combined;
    error_log /var/log/nginx/bloodbank-frontend-error.log warn;
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.bloodconnect.com;
    
    ssl_certificate /etc/letsencrypt/live/bloodconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bloodconnect.com/privkey.pem;

    return 301 https://bloodconnect.com$request_uri;
}

# Redirect HTTP to HTTPS (Frontend)
server {
    listen 80;
    listen [::]:80;
    server_name bloodconnect.com www.bloodconnect.com;

    location / {
        return 301 https://bloodconnect.com$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
