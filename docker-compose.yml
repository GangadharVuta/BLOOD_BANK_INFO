version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: bloodbank-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: blood_bank_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bloodbank-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build: ./blood-bank-node
    container_name: bloodbank-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      APP_PORT: 4000
      MONGODB_URI: mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/blood_bank_db
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      SENTRY_RELEASE: ${SENTRY_RELEASE}
      SESSION_SECRET: ${SESSION_SECRET}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      REACT_APP_URL: ${REACT_APP_URL}
      API_DOMAIN: ${API_DOMAIN}
      LOG_LEVEL: info
      LOG_DIR: /app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./blood-bank-node/logs:/app/logs
    networks:
      - bloodbank-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)});"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: bloodbank-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./bloodbank-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./blood-bank-react/build:/var/www/bloodbank-frontend/build:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - bloodbank-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Redis for caching (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: bloodbank-redis
  #   restart: always
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - bloodbank-network
  #   command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

volumes:
  mongodb_data:
  mongodb_config:
  # redis_data:

networks:
  bloodbank-network:
    driver: bridge
